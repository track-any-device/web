name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Transform for Cloudflare Pages
        run: pnpm exec next-on-pages
        env:
          NEXT_PUBLIC_APP_URL: https://track-any-device.com
          SSO_CLIENT_ID:       tad_web_portal
          SSO_CLIENT_SECRET:   ${{ secrets.SSO_CLIENT_SECRET }}

      # Deployment is handled by Cloudflare Pages native GitHub integration.
      # Secrets are set directly in the Cloudflare dashboard and are available
      # at both build time and runtime without any extra API calls.
