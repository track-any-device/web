name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Pages
        run: pnpm dlx vercel build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GRAPHQL_URL:         ${{ secrets.GRAPHQL_URL }}
          SSO_CLIENT_ID:       ${{ secrets.SSO_CLIENT_ID }}
          SSO_CLIENT_SECRET:   ${{ secrets.SSO_CLIENT_SECRET }}
          SSO_REDIRECT_URI:    ${{ secrets.SSO_REDIRECT_URI }}
          SSO_AUTH_URL:        ${{ secrets.SSO_AUTH_URL }}
          SSO_TOKEN_URL:       ${{ secrets.SSO_TOKEN_URL }}
          SSO_USERINFO_URL:    ${{ secrets.SSO_USERINFO_URL }}

      - name: Transform for Cloudflare Pages
        run: pnpm exec next-on-pages --skip-build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command:     pages deploy .vercel/output/static --project-name=tad-web --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
