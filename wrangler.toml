name = "tad-web"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[vars]
NEXT_PUBLIC_APP_URL = "https://track-any-device.com"

# Secrets are set via Cloudflare dashboard or `wrangler secret put`:
# SSO_CLIENT_SECRET
# SSO_CLIENT_ID
# SSO_REDIRECT_URI
# SSO_AUTH_URL
# SSO_TOKEN_URL
# SSO_USERINFO_URL
# GRAPHQL_URL
# GRAPHQL_KEY
# GRAPHQL_SECRET
